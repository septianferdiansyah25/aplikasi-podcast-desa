{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card glass-card shadow-lg p-4">
            <div class="text-center mb-4">
                <i class="fas fa-lock fa-3x text-primary mb-3"></i>
                <h2 class="fw-bold">Login Pengguna</h2>
                <p class="text-muted">Gunakan akun Anda untuk mengakses fitur</p>
            </div>

            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label for="email" class="form-label">Alamat Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" id="email" class="form-control" placeholder="admin@desa.id"
                            required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-key"></i></span>
                        <input type="password" name="password" id="password" class="form-control"
                            placeholder="Your password" required>
                    </div>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary py-2 text-uppercase fw-bold">Masuk Sekarang</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">Halaman ini khusus untuk akses administrasi desa.</p>
            </div>
        </div>

        <div class="mt-4 text-center">
            <div class="alert alert-info py-2" style="font-size: 0.85rem;">
                <strong>Akun Demo Admin:</strong><br>
                Email: <code>admin@desa.id</code> | Pass: <code>admin123</code>
            </div>
        </div>
    </div>
</div>
{% endblock %}
